name: Posture
options:
  bundleIdPrefix: com.jackwallner
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YXG4MP6W39
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "10"
    GENERATE_INFOPLIST_FILE: NO

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.14.0

schemes:
  Posture:
    build:
      targets:
        Posture: all
        PostureWatch: all
        PostureTests: [test]
    test:
      targets:
        - PostureTests
    run:
      config: Debug
  PostureWatch:
    build:
      targets:
        PostureWatch: all
    run:
      config: Debug

targets:
  Posture:
    type: application
    platform: iOS
    sources:
      - path: Posture
      - path: Shared
      - path: Posture.storekit
        buildPhase: resources
      - path: Posture/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.posture
        INFOPLIST_FILE: Posture/Info.plist
        CODE_SIGN_ENTITLEMENTS: Posture/Posture.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - target: PostureWatch
        embed: true

  PostureWatch:
    type: application
    platform: watchOS
    sources:
      - path: PostureWatch
      - path: Shared
      - path: PostureWatch/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.posture.watch
        INFOPLIST_FILE: PostureWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: PostureWatch/PostureWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - target: PostureWatchWidget

  PostureWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: PostureWatchWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.posture.watch.widget
        INFOPLIST_FILE: PostureWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PostureWatchWidget/PostureWatchWidget.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"

  PostureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PostureTests
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.posture.tests
    dependencies:
      - target: Posture
